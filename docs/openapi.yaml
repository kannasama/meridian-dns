  /audit:
    get:
      summary: Query audit log
      tags: [Audit]
      description: "Required role: viewer"
      parameters:
        - name: entity_type
          in: query
          required: false
          schema:
            type: string
        - name: identity
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: List of audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /audit/export:
    get:
      summary: Export audit log as NDJSON stream
      tags: [Audit]
      description: "Required role: admin"
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
