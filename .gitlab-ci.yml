# ── Meridian DNS — GitLab CI/CD Pipeline ─────────────────────────────────────
#
# Build and test run on the internal GitLab instance.
# Tagged releases are mirrored to GitHub (Settings → Repository → Mirroring).
# Images are published to Docker Hub and GHCR on tag push.
#
# Required CI/CD variables (Settings → CI/CD → Variables, masked + protected):
#   DNS_DB_PASSWORD   — password for the test PostgreSQL instance
#   DNS_MASTER_KEY    — AES-256 master key (openssl rand -hex 32)
#   DNS_JWT_SECRET    — JWT signing secret (openssl rand -hex 32)
#   DOCKERHUB_USERNAME — Docker Hub username or organisation
#   DOCKERHUB_TOKEN   — Docker Hub access token (read/write)
#   GHCR_USERNAME     — GitHub username or organisation
#   GHCR_TOKEN        — GitHub PAT with write:packages scope
#
# Runner requirements:
#   - docker executor for all jobs
#   - a runner tagged 'privileged' with privileged: true for the docker:publish job
#     (required for Docker-in-Docker)

stages:
  - lint
  - build
  - test
  - docker

# ── Stage: lint ───────────────────────────────────────────────────────────────

lint:headers:
  stage: lint
  image: alpine:3.21
  before_script:
    - apk add --no-cache bash findutils grep
  script:
    - bash scripts/check-license-headers.sh

# ── Stage: build ──────────────────────────────────────────────────────────────

build:cpp:
  stage: build
  image: fedora:43
  before_script:
    - dnf update -y --setopt=install_weak_deps=False -q && dnf clean all
    - |
      dnf install -y --setopt=install_weak_deps=False \
        cmake ninja-build gcc-c++ \
        libpqxx-devel openssl-devel libgit2-devel \
        json-devel spdlog-devel asio-devel \
        pkgconf-pkg-config git ca-certificates \
        lasso-devel libxml2-devel xmlsec1-devel xmlsec1-openssl-devel glib2-devel \
        jansson-devel libcurl-devel cjose-devel \
        autoconf automake libtool \
        httpd-devel pcre2-devel \
      && dnf clean all
  script:
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_UI=OFF
    - cmake --build build --parallel
  artifacts:
    paths:
      - build/tests/dns-tests
    expire_in: 1 hour

build:ui:
  stage: build
  image: node:22-slim
  script:
    - cd ui && npm ci && npm run build
  artifacts:
    paths:
      - ui/dist/
    expire_in: 1 hour

# ── Stage: test ───────────────────────────────────────────────────────────────

test:unit:
  stage: test
  image: fedora:43
  needs: [build:cpp]
  before_script:
    - |
      dnf install -y --setopt=install_weak_deps=False \
        libpq libpqxx openssl-libs libgit2 spdlog fmt \
        lasso libxml2 xmlsec1 xmlsec1-openssl glib2 \
        jansson libcurl cjose \
      && dnf clean all
  script:
    # DNS_DB_URL is not set — DB integration tests skip gracefully
    - build/tests/dns-tests

test:integration:
  stage: test
  image: fedora:43
  needs: [build:cpp]
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: meridian_dns_test
    POSTGRES_USER: dns
    POSTGRES_PASSWORD: $DNS_DB_PASSWORD
    DNS_DB_URL: "postgresql://dns:${DNS_DB_PASSWORD}@postgres/meridian_dns_test"
  before_script:
    - |
      dnf install -y --setopt=install_weak_deps=False \
        libpq libpqxx openssl-libs libgit2 spdlog fmt \
        lasso libxml2 xmlsec1 xmlsec1-openssl glib2 \
        jansson libcurl cjose \
        postgresql \
      && dnf clean all
    - |
      for i in $(seq 1 30); do
        pg_isready -h postgres -U dns && break
        echo "Waiting for postgres ($i/30)..."
        [ "$i" -eq 30 ] && echo "ERROR: postgres did not become ready" && exit 1
        sleep 2
      done
    - |
      for f in $(find scripts/db -name '*.sql' | sort); do
        echo "Applying $f ..."
        PGPASSWORD=$DNS_DB_PASSWORD psql -h postgres -U dns -d meridian_dns_test -f "$f"
      done
  script:
    - build/tests/dns-tests

# ── Stage: docker ─────────────────────────────────────────────────────────────

docker:publish:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    DOCKER_TLS_CERTDIR: /certs
    DOCKER_CERT_PATH: /certs/client
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
  script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
    - docker buildx create --use
    - |
      docker buildx build --push \
        -t "$DOCKERHUB_USERNAME/meridian-dns:$CI_COMMIT_TAG" \
        -t "$DOCKERHUB_USERNAME/meridian-dns:latest" \
        -t "ghcr.io/$GHCR_USERNAME/meridian-dns:$CI_COMMIT_TAG" \
        -t "ghcr.io/$GHCR_USERNAME/meridian-dns:latest" \
        .
  tags:
    - privileged
